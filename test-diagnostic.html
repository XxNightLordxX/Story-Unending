<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Diagnostic Test</title>
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>
<body>
    <h1>Diagnostic Test</h1>
    <div id="results"></div>
    
    <script>
        const results = document.getElementById('results');
        
        function log(message) {
            const p = document.createElement('p');
            p.textContent = message;
            results.appendChild(p);
        }
        
        log('Page loaded');
        log('Loading backstory-engine.js...');
    </script>
    
    <script src="backstory-engine.js?v=4" onerror="log('ERROR loading backstory-engine.js')"></script>
    
    <script>
        log('backstory-engine.js loaded');
        log('Loading story-engine.js...');
    </script>
    
    <script src="story-engine.js?v=4" onerror="log('ERROR loading story-engine.js')"></script>
    
    <script>
        log('story-engine.js loaded');
        log('Loading js/uniqueness-tracker.js...');
    </script>
    
    <script src="js/uniqueness-tracker.js?v=4" onerror="log('ERROR loading js/uniqueness-tracker.js')"></script>
    
    <script>
        log('js/uniqueness-tracker.js loaded');
        
        // Check what's available
        log('Checking window.BackstoryEngine: ' + (typeof window.BackstoryEngine));
        log('Checking window.StoryEngine: ' + (typeof window.StoryEngine));
        log('Checking window.UniquenessTracker: ' + (typeof window.UniquenessTracker));
        
        if (typeof window.StoryEngine !== 'undefined') {
            log('StoryEngine.generateChapter: ' + (typeof window.StoryEngine.generateChapter));
        }
    </script>
</body>
</html>
