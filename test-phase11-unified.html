            progressFill.textContent = percentage + '%';

            const result = {
                testNumber: testNumber,

            currentTest++;
            updateProgress();

            // Display summary
            displaySummary();
            document.getElementById('runAllTests').disabled = false;
        }

        function displaySummary() {
            document.getElementById('totalTests').textContent = totalTests;
            document.getElementById('passedTests').textContent = passedTests;
            document.getElementById('failedTests').textContent = failedTests;
            
            const passRate = ((passedTests / totalTests) * 100).toFixed(2);
            document.getElementById('passRate').textContent = passRate + '%';

            const summaryDiv = document.getElementById('summary');
            summaryDiv.style.display = 'block';

            const finalStatus = document.getElementById('finalStatus');
            if (failedTests === 0) {
                finalStatus.innerHTML = '<strong style="color: green;">✅ ALL TESTS PASSED! Phase 11 Complete.</strong>';
            } else {
                finalStatus.innerHTML = '<strong style="color: red;">❌ SOME TESTS FAILED. Please review and fix.</strong>';
            }

            // Scroll to summary
            summaryDiv.scrollIntoView({ behavior: 'smooth' });
        }

        function resetTests() {
            document.getElementById('results').innerHTML = '';
            document.getElementById('summary').style.display = 'none';
            document.getElementById('progressFill').style.width = '0%';
            document.getElementById('progressFill').textContent = '0%';
            testResults = [];
            passedTests = 0;
            failedTests = 0;
            currentTest = 0;
        }

        // Auto-run tests on page load
        window.onload = function() {
            console.log('Phase 11: Integration Tests ready');
            console.log('Click "Run All Tests" to execute 140 integration tests');
        };
    </script>
</body>
</html>
