<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Test StoryEngine Loading</title>
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>
<body>
    <h1>Test StoryEngine Loading</h1>
    <div id="results"></div>
    
    <script src="backstory-engine.js?v=4"></script>
    <script src="story-engine.js?v=4"></script>
    <script>
        const results = document.getElementById('results');
        
        function log(message, success = true) {
            const div = document.createElement('div');
            div.style.color = success ? 'green' : 'red';
            div.textContent = message;
            results.appendChild(div);
        }
        
        // Test 1: Check if BackstoryEngine exists
        if (typeof window.BackstoryEngine === 'object') {
            log('✓ BackstoryEngine loaded');
        } else {
            log('✗ BackstoryEngine NOT loaded', false);
        }
        
        // Test 2: Check if StoryEngine exists
        if (typeof window.StoryEngine === 'object') {
            log('✓ StoryEngine loaded');
        } else {
            log('✗ StoryEngine NOT loaded', false);
        }
        
        // Test 3: Check if generateChapter exists
        if (typeof window.StoryEngine === 'object' && typeof window.StoryEngine.generateChapter === 'function') {
            log('✓ StoryEngine.generateChapter() exists');
        } else {
            log('✗ StoryEngine.generateChapter() does NOT exist', false);
        }
        
        // Test 4: Try to generate a chapter
        try {
            const chapter = window.StoryEngine.generateChapter();
            log(`✓ Generated chapter: ${chapter.title}`);
        } catch (error) {
            log(`✗ Error generating chapter: ${error.message}`, false);
        }
    </script>
</body>
</html>
